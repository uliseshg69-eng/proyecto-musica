<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Proyecto Música - Reproductor de Música</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎵 Mi Reproductor de Música</h1>
            <p>Disfruta tu música favorita</p>
        </header>

        <!-- Main Player -->
        <div class="player">
            <!-- Album Art / Visualizer -->
            <div class="album-art">
                <div class="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <h2 id="song-title">Canción de Ejemplo</h2>
                <p id="song-artist">Artista Ejemplo</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <span id="duration">0:00</span>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn" id="prev-btn" title="Anterior">
                    <span>⏮️</span>
                </button>
                <button class="control-btn play-btn" id="play-btn" title="Reproducir">
                    <span>▶️</span>
                </button>
                <button class="control-btn" id="next-btn" title="Siguiente">
                    <span>⏭️</span>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-container">
                <span>🔊</span>
                <input type="range" min="0" max="100" value="70" id="volume-slider">
                <span id="volume-value">70</span>
            </div>

            <!-- Playlist -->
            <div class="playlist-section">
                <h3>📋 Playlist</h3>
                <div class="playlist" id="playlist">
                    <!-- Las canciones se cargarán aquí -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Proyecto Música | Hecho con ❤️</p>
        </footer>
    </div>

    <!-- Audio Element -->
    <audio id="audio-player"></audio>

    <script src="script.js"></script>
</body>
</html>
