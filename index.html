<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Música con Voces y Efectos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎵 Generador de Música con Voces y Efectos</h1>
        
        <div class="controls">
            <div class="instrument-selector">
                <label for="instrument">Instrumento/Voz/Efecto:</label>
                <select id="instrument">
                    <optgroup label="🎹 Instrumentos Clásicos">
                        <option value="piano">🎹 Piano</option>
                        <option value="guitar">🎸 Guitarra</option>
                        <option value="violin">🎻 Violín</option>
                        <option value="flute">🪈 Flauta</option>
                        <option value="trumpet">🎺 Trompeta</option>
                        <option value="drums">🥁 Batería</option>
                    </optgroup>
                    <optgroup label="🎤 Voces Sintetizadas">
                        <option value="soprano">🎤 Voz Soprano (Femenina)</option>
                        <option value="baritone">🎤 Voz Barítono (Masculina)</option>
                        <option value="robot">🤖 Voz Robot/Alien</option>
                        <option value="angelic">👼 Voz Angelical</option>
                    </optgroup>
                    <optgroup label="✨ Efectos de Sonido">
                        <option value="laser">⚡ Láser</option>
                        <option value="whoosh">💨 Whoosh (Viento)</option>
                        <option value="bell">🔔 Campanada</option>
                        <option value="pop">💥 Pop/Boing</option>
                    </optgroup>
                </select>
            </div>

            <div class="vowel-selector" id="vowelSelector" style="display:none;">
                <label for="vowel">Vocal:</label>
                <select id="vowel">
                    <option value="a">A</option>
                    <option value="e">E</option>
                    <option value="i">I</option>
                    <option value="o">O</option>
                    <option value="u">U</option>
                </select>
            </div>

            <div class="note-selector">
                <label for="octave">Octava:</label>
                <input type="range" id="octave" min="1" max="8" value="4">
                <span id="octaveDisplay">4</span>
            </div>

            <div class="tempo-selector">
                <label for="tempo">Tempo (BPM):</label>
                <input type="range" id="tempo" min="40" max="200" value="120">
                <span id="tempoDisplay">120</span>
            </div>
        </div>

        <div class="keyboard">
            <h2>Notas Musicales</h2>
            <div class="keys">
                <button class="key white" data-note="C" data-freq="261.63">C</button>
                <button class="key black" data-note="C#" data-freq="277.18"></button>
                <button class="key white" data-note="D" data-freq="293.66">D</button>
                <button class="key black" data-note="D#" data-freq="311.13"></button>
                <button class="key white" data-note="E" data-freq="329.63">E</button>
                <button class="key white" data-note="F" data-freq="349.23">F</button>
                <button class="key black" data-note="F#" data-freq="369.99"></button>
                <button class="key white" data-note="G" data-freq="392.00">G</button>
                <button class="key black" data-note="G#" data-freq="415.30"></button>
                <button class="key white" data-note="A" data-freq="440.00">A</button>
                <button class="key black" data-note="A#" data-freq="466.16"></button>
                <button class="key white" data-note="B" data-freq="493.88">B</button>
            </div>
        </div>

        <div class="sequencer">
            <h2>Secuenciador</h2>
            <div class="sequencer-controls">
                <button id="playBtn" class="control-btn">▶ Reproducir</button>
                <button id="stopBtn" class="control-btn">⏹ Detener</button>
                <button id="clearBtn" class="control-btn">🗑️ Limpiar</button>
            </div>
            <div id="sequencerGrid" class="sequencer-grid"></div>
        </div>

        <div class="effects">
            <h2>Efectos y Controles</h2>
            <div class="effect-controls">
                <label for="volume">Volumen:</label>
                <input type="range" id="volume" min="0" max="100" value="50">
                <span id="volumeDisplay">50%</span>
            </div>
            <div class="effect-controls">
                <label for="reverb">Reverb:</label>
                <input type="range" id="reverb" min="0" max="100" value="30">
                <span id="reverbDisplay">30%</span>
            </div>
            <div class="effect-controls">
                <label for="delay">Delay:</label>
                <input type="range" id="delay" min="0" max="100" value="0">
                <span id="delayDisplay">0%</span>
            </div>
            <div class="effect-controls">
                <label for="duration">Duración de Nota (s):</label>
                <input type="range" id="duration" min="0.1" max="3" step="0.1" value="0.5">
                <span id="durationDisplay">0.5</span>
            </div>
        </div>

        <div class="demo-buttons">
            <h2>Demos Rápidas</h2>
            <div class="demo-grid">
                <button class="demo-btn" onclick="playDemo('soprano')">Cantar (Soprano)</button>
                <button class="demo-btn" onclick="playDemo('baritone')">Cantar (Barítono)</button>
                <button class="demo-btn" onclick="playDemo('robot')">Voz Robot</button>
                <button class="demo-btn" onclick="playDemo('angelic')">Voz Angelical</button>
                <button class="demo-btn" onclick="playDemo('laser')">Efecto Láser</button>
                <button class="demo-btn" onclick="playDemo('whoosh')">Efecto Whoosh</button>
                <button class="demo-btn" onclick="playDemo('bell')">Campanada</button>
                <button class="demo-btn" onclick="playDemo('pop')">Pop/Boing</button>
            </div>
        </div>
    </div>

    <script src="sounds.js"></script>
    <script src="app.js"></script>
</body>
</html>
